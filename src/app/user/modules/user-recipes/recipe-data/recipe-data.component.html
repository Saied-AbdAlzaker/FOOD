<section class="rounded-5 p-3">
  <div class="d-flex justify-content-between align-items-center">
    <h4 class="text-second">Recipe Details</h4>
    <a (click)="onNoClick()">
      <i class="fa-regular fa-xmark-circle fa-xl mx-2 text-danger"></i>
    </a>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-10 mx-auto">
        <div class="avatar my-3">
          <img [src]="'https://upskilling-egypt.com/'+data.imagePath" alt="" class="w-100 rounded-5">
        </div>
      </div>
      <div class="col-md-12 my-2 shadow bg-detils">
        <h5><span>Name:</span> {{data.name}}</h5>
      </div>
      <div class="col-md-12 my-2 shadow bg-detils">
        <h5><span>Price:</span> {{data.price}}</h5>
      </div>
      <div class="col-md-12 my-2 shadow bg-detils">
        <h6> <span>Description:</span> {{data.description}}</h6>
      </div>
      <div class="col-md-12 text-end mt-3">
        <button class="btn btn-outline-danger"  [mat-dialog-close]="data.id" cdkFocusInitial>
          <i class="fa-regular fa-heart mx-2"></i>
          <span>Favorite</span>
        </button>
      </div>
    </div>
  </div>
</section>
