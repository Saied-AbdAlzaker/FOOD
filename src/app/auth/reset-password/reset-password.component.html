<section id="resetPassword">
    <div class="container">
      <div class="row">
        <div class="col-md-6 mx-auto">
          <div class="card-auth">
            <div class="text-center">
              <img src="../../../assets/images/logo.svg" alt="logo" class="w-50">
            </div>
            <h2>Reset Password</h2>
            <p class="text-second">Welcome Back! Please Enter Your Details</p>
  
            <form [formGroup]="resetForm" (ngSubmit)="onSubmit(resetForm)">
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-mobile-screen"></i></span>
                <input formControlName="email" type="text" class="form-control" placeholder="Enter Your Email"
                  aria-label="email" aria-describedby="basic-addon1">
              </div>
              <div class="alert alert-danger p-2" *ngIf="resetForm.controls.email.errors && resetForm.controls.email.touched">
                <p *ngIf="resetForm.get('email')?.getError('required')">Email Is Required</p>
                <p *ngIf="resetForm.get('email')?.getError('email')">Email Is Invalid</p>
              </div>

              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-lock"></i></span>
                <input formControlName="seed" type="text" class="form-control" placeholder="OTP">
              </div>
              <div class="alert alert-danger p-2" *ngIf="resetForm.controls.seed.errors && resetForm.controls.seed.touched">
                <p *ngIf="resetForm.get('seed')?.getError('required')">OTP Is Required</p>
              </div>
              
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-lock"></i></span>
                <input formControlName="password" [type]="hide? 'password':'text'" class="form-control" placeholder="Enter Password"
                  aria-label="password" aria-describedby="basic-addon1">
                  <span class="eye-icon" (click)="hide=!hide"><i class="fa-solid" [class]="hide?'fa-eye-slash':'fa-eye'"></i></span>
              </div>
              <div class="alert alert-danger p-2" *ngIf="resetForm.controls.password.errors && resetForm.controls.password.touched">
                <p *ngIf="resetForm.get('password')?.getError('required')">Password Is Required</p>
                <p *ngIf="resetForm.get('password')?.getError('pattern')">Please must have A,a ,@,%,$,#, From 8 , 16</p>
              </div>
              
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-lock"></i></span>
                <input formControlName="confirmPassword" [type]="hideConfirm? 'password':'text'" class="form-control" placeholder="Confirm Password"
                  aria-label="confirmPassword" aria-describedby="basic-addon1">
                  <span class="eye-icon" (click)="hideConfirm=!hideConfirm"><i class="fa-solid" [class]="hideConfirm?'fa-eye-slash':'fa-eye'"></i></span>
              </div>
              <!-- <div class="alert alert-danger p-2" *ngIf="resetForm.controls.confirmPassword.errors && resetForm.controls.confirmPassword.touched">
                <p *ngIf="resetForm.get('confirmPassword')?.getError('required')">confirmPassword Is Required</p>
                <p *ngIf="resetForm.get('confirmPassword')?.getError('pattern')">confirmPassword Is Invalid</p>
              </div> -->

              <div class="alert alert-danger p-2"
                        *ngIf="resetForm.controls.confirmPassword.errors && resetForm.controls.confirmPassword.touched">
                        <p *ngIf="resetForm.get('confirmPassword')?.getError('required')" class="mb-0">Confirm New Password Is
                            Required</p>
                            <p *ngIf="resetForm.get('confirmPassword')?.getError('invalid')" class="mb-0">Password And Confirm Password Not Match</p>
                    </div>
  
            <button  [disabled]="resetForm.invalid" class="btn primary w-100">Reset Password</button>
  
            </form>
  
          </div>
        </div>
      </div>
    </div>
  </section>
