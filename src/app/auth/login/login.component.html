<section id="login">
  <div class="login-box">
    <div class="container">
      <div class="row">
        <div class="col-md-6 mx-auto">
          <div class="card-auth">
            <div class="text-center">
              <img src="../../../assets/images/logo-.svg" alt="logo" class="w-75">
            </div>
            <h2>Log In</h2>
            <p class="text-second">Welcome Back! Please Enter Your Details</p>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit(loginForm)">
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-mobile-screen"></i></span>
                <input formControlName="email" type="text" class="form-control" placeholder="Enter Your Email"
                  aria-label="email" aria-describedby="basic-addon1">
              </div>
              <div class="alert alert-danger p-2"
                *ngIf="loginForm.controls.email.errors && loginForm.controls.email.touched">
                <p *ngIf="loginForm.get('email')?.getError('required')" class="mb-0">Email Is Required</p>
                <p *ngIf="loginForm.get('email')?.getError('email')" class="mb-0">Email Is Invalid</p>
              </div>

              <div class="input-group mb-3 position-relative">
                <span class="input-group-text" id="basic-addon1"><i class="fa-solid fa-lock"></i></span>
                <input formControlName="password" [type]="hide?'password':'text'" class="form-control"
                  placeholder="Enter Password" aria-label="password" aria-describedby="basic-addon1">
                <span class="eye-icon" (click)="hide=!hide"><i class="fa-solid"
                    [class]="hide?'fa-eye-slash':'fa-eye'"></i></span>
              </div>
              <div class="alert alert-danger p-2"
                *ngIf="loginForm.controls.password.errors && loginForm.controls.password.touched">
                <p *ngIf="loginForm.get('password')?.getError('required')" class="mb-0">Password Is Required</p>
                <p *ngIf="loginForm.get('password')?.getError('pattern')" class="mb-0">Please must have A,a ,@,%,$,#,
                  From 8 , 16</p>
              </div>

              <div class="d-flex justify-content-between my-2">
                <a routerLink="/auth/register" class="text-second text-decoration-none">Register Now?</a>
                <a (click)="openDialog()" class="text-main text-decoration-none">Forgot Password?</a>
              </div>


              <button [disabled]="loginForm.invalid" class="primary w-100 p-2" *ngIf="isLoading==false">Login</button>
              <button class="primary w-100 p-2" *ngIf="isLoading==true">
                <app-button-loader></app-button-loader>
              </button>


            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
