<div class="card-auth p-5">
    <h4 class="d-flex align-items-center justify-content-between mb-5">
        <span>Add Category</span>
        <span (click)="onNoClick()"><i class="fa-solid fa-xmark" style="color: #f00a0a;"></i></span>
    </h4>

    <div class="input-group mb-3">
        <input [(ngModel)]="categoryName" type="text" class="form-control" placeholder="Category Name"
            aria-label="email" aria-describedby="basic-addon1">
    </div>

    <button [mat-dialog-close]="categoryName" cdkFocusInitial class="btn bg-main text-white w-100">Save</button>
</div>
