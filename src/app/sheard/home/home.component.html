<section id="home">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <div>
                    <h2>Welcome {{userName}}</h2>
                    <p>This is a welcoming screen for the entry of the application , <br> you can now see the options</p>
                </div>
            </div>
            <div class="col-md-4">
                <div>
                    <img src="../../../assets/images/home-avatar.svg" class="w-100" alt="home-avatar">
                </div>
            </div>
        </div>
    </div>
</section>

<section class="my-3 p-4 bg-second shadow">
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <h2>Fill the <span class="text-main">Recipes !</span></h2>
                <p class="text-muted">you can now fill the meals easily using the table and form ,<br>
                     click here and sill it with the table !</p>
            </div>
            <div class="col-md-4 m-auto text-center">
                <button [routerLink]="['/dashboard/admin/recipes']" class="btn primary">Fill Recipes <i class="fa-solid fa-arrow-right"></i></button>
              </div>
        </div>
    </div>
</section>
