<div class="card-auth p-5">
  <h4 class="text-end">
    <span (click)="onNoClick()"><i class="fa-solid fa-xmark" style="color: #f00a0a;"></i></span>
  </h4>
  <div class="text-center">
    <img src="../../../assets/images/delete-img.svg" alt="delete-img" class="w-25 mb-2">
    <h4>Delete This Item ? {{data.name}}</h4>
    <p>are you sure you want to delete this item ? if you are sure just click on delete it</p>
  </div>
  <button [mat-dialog-close]="data" cdkFocusInitial class="btn btn-outline-danger">Delete this item</button>

</div>
